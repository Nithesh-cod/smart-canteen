services:
  - type: web
    name: smart-canteen-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: PRINTER_TYPE
        value: none
      # ── Add these manually in the Render dashboard ────────────────────────────
      # DATABASE_URL          → Supabase connection string
      # JWT_SECRET            → strong random secret
      # JWT_REFRESH_SECRET    → strong random secret
      # RAZORPAY_KEY_ID       → rzp_live_... or rzp_test_...
      # RAZORPAY_KEY_SECRET   → Razorpay secret
      # RAZORPAY_WEBHOOK_SECRET
      # ADMIN_ROLLS           → comma-separated roll numbers
      # CHEF_ROLLS            → comma-separated roll numbers
      # FRONTEND_URLS         → https://smart-canteen.vercel.app  (your Vercel URL)
      # CANTEEN_NAME / CANTEEN_COLLEGE / CANTEEN_ADDRESS / CANTEEN_GSTIN / CANTEEN_PHONE
